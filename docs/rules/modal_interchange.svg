<svg xmlns="http://www.w3.org/2000/svg" width="960" height="430" viewBox="0 0 960 430" role="img" aria-labelledby="title desc">
  <title id="title">Modal interchange reharmonization rule</title>
  <desc id="desc">C△, F△, G7, C△ is colored with borrowed F_7 and Bb7.</desc>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .panel { fill: #fff; stroke: #cbd5e1; stroke-width: 2; }
      .title { fill: #0f172a; font-family: DejaVu Sans; font-size: 30px; font-weight: 700; }
      .subtitle, .note { fill: #334155; font-family: DejaVu Sans; font-size: 16px; }
      .label { fill: #334155; font-family: DejaVu Sans; font-size: 14px; font-weight: 700; letter-spacing: .08em; }
      .chord { fill: #111827; font-family: DejaVu Sans; font-size: 22px; font-weight: 700; }
      .roman { fill: #64748b; font-family: DejaVu Sans; font-size: 13px; }
      .box-in { fill: #e0f2fe; stroke: #0284c7; stroke-width: 2; }
      .box-out { fill: #dcfce7; stroke: #16a34a; stroke-width: 2; }
      .borrowed { fill: #f3e8ff; stroke: #9333ea; stroke-width: 2; }
      .arrow { stroke: #475569; stroke-width: 2; marker-end: url(#arrowhead); }
      .minor { fill: #faf5ff; stroke: #9333ea; stroke-width: 2; stroke-dasharray: 6 5; }
      .rule { fill: #fef3c7; stroke: #d97706; stroke-width: 2; }
    </style>
    <marker id="arrowhead" markerWidth="7" markerHeight="6" refX="6" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#475569"/>
    </marker>
  </defs>
  <rect class="bg" width="960" height="430"/>
  <text class="title" x="48" y="52">modal_interchange.py</text>
  <text class="subtitle" x="48" y="78">Borrow color from the parallel minor while keeping the cadence clear.</text>

  <rect class="panel" x="48" y="105" width="864" height="270" rx="8"/>
  <text class="label" x="78" y="145">INPUT</text>
  <text class="label" x="78" y="285">OUTPUT</text>

  <rect class="box-in" x="175" y="122" width="112" height="54" rx="7"/>
  <rect class="box-in" x="335" y="122" width="112" height="54" rx="7"/>
  <rect class="box-in" x="495" y="122" width="112" height="54" rx="7"/>
  <rect class="box-in" x="655" y="122" width="112" height="54" rx="7"/>
  <text class="chord" x="231" y="156" text-anchor="middle">C△</text>
  <text class="chord" x="391" y="156" text-anchor="middle">F△</text>
  <text class="chord" x="551" y="156" text-anchor="middle">G7</text>
  <text class="chord" x="711" y="156" text-anchor="middle">C△</text>
  <text class="roman" x="391" y="194" text-anchor="middle">IV△</text>
  <text class="roman" x="551" y="194" text-anchor="middle">V7</text>
  <line class="arrow" x1="470" y1="202" x2="470" y2="228"/>

  <rect class="minor" x="306" y="225" width="334" height="124" rx="12"/>
  <text class="note" x="473" y="248" text-anchor="middle">borrowed from C minor</text>
  <rect class="box-out" x="155" y="260" width="112" height="54" rx="7"/>
  <rect class="borrowed" x="335" y="260" width="112" height="54" rx="7"/>
  <rect class="borrowed" x="495" y="260" width="112" height="54" rx="7"/>
  <rect class="box-out" x="675" y="260" width="112" height="54" rx="7"/>
  <text class="chord" x="211" y="294" text-anchor="middle">C△</text>
  <text class="chord" x="391" y="294" text-anchor="middle">F_7</text>
  <text class="chord" x="551" y="294" text-anchor="middle">Bb7</text>
  <text class="chord" x="731" y="294" text-anchor="middle">C△</text>
  <text class="roman" x="391" y="337" text-anchor="middle">iv_7</text>
  <text class="roman" x="551" y="337" text-anchor="middle">bVII7</text>

  <rect class="rule" x="48" y="390" width="864" height="28" rx="6"/>
  <text class="note" x="70" y="409">Rule: use parallel-minor chords for darker color, then resolve back to the home key.</text>
</svg>
