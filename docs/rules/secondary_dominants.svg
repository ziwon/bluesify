<svg xmlns="http://www.w3.org/2000/svg" width="960" height="370" viewBox="0 0 960 370" role="img" aria-labelledby="title desc">
  <title id="title">Secondary dominants reharmonization rule</title>
  <desc id="desc">C△, A_7, D_7, G7 becomes C△, E7, A_7, A7, D_7, G7.</desc>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .panel { fill: #fff; stroke: #cbd5e1; stroke-width: 2; }
      .title { fill: #0f172a; font-family: DejaVu Sans; font-size: 30px; font-weight: 700; }
      .subtitle, .note { fill: #334155; font-family: DejaVu Sans; font-size: 16px; }
      .label { fill: #334155; font-family: DejaVu Sans; font-size: 14px; font-weight: 700; letter-spacing: .08em; }
      .chord { fill: #111827; font-family: DejaVu Sans; font-size: 22px; font-weight: 700; }
      .roman { fill: #64748b; font-family: DejaVu Sans; font-size: 13px; }
      .box-in { fill: #e0f2fe; stroke: #0284c7; stroke-width: 2; }
      .box-out { fill: #ede9fe; stroke: #7c3aed; stroke-width: 2; }
      .dominant { fill: #fee2e2; stroke: #dc2626; stroke-width: 2; }
      .arrow { stroke: #475569; stroke-width: 2; marker-end: url(#arrowhead); }
      .target { stroke: #dc2626; stroke-width: 2; fill: none; stroke-dasharray: 5 5; marker-end: url(#redhead); }
      .rule { fill: #fef3c7; stroke: #d97706; stroke-width: 2; }
    </style>
    <marker id="arrowhead" markerWidth="7" markerHeight="6" refX="6" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#475569"/>
    </marker>
    <marker id="redhead" markerWidth="7" markerHeight="6" refX="6" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#dc2626"/>
    </marker>
  </defs>
  <rect class="bg" width="960" height="370"/>
  <text class="title" x="48" y="52">secondary_dominants.py</text>
  <text class="subtitle" x="48" y="78">Add temporary V7 chords that point strongly at important targets.</text>

  <rect class="panel" x="48" y="105" width="864" height="210" rx="8"/>
  <text class="label" x="78" y="145">INPUT</text>
  <text class="label" x="78" y="252">OUTPUT</text>

  <g transform="translate(190 0)">
    <rect class="box-in" x="0" y="122" width="112" height="54" rx="7"/>
    <text class="chord" x="56" y="156" text-anchor="middle">C△</text>
    <text class="roman" x="56" y="194" text-anchor="middle">I△</text>
  </g>
  <g transform="translate(348 0)">
    <rect class="box-in" x="0" y="122" width="112" height="54" rx="7"/>
    <text class="chord" x="56" y="156" text-anchor="middle">A_7</text>
    <text class="roman" x="56" y="194" text-anchor="middle">vi_7</text>
  </g>
  <g transform="translate(506 0)">
    <rect class="box-in" x="0" y="122" width="112" height="54" rx="7"/>
    <text class="chord" x="56" y="156" text-anchor="middle">D_7</text>
    <text class="roman" x="56" y="194" text-anchor="middle">ii_7</text>
  </g>
  <g transform="translate(664 0)">
    <rect class="box-in" x="0" y="122" width="112" height="54" rx="7"/>
    <text class="chord" x="56" y="156" text-anchor="middle">G7</text>
    <text class="roman" x="56" y="194" text-anchor="middle">V7</text>
  </g>

  <line class="arrow" x1="482" y1="201" x2="482" y2="223"/>

  <path class="target" d="M368 225 C392 205, 444 205, 476 225"/>
  <path class="target" d="M618 225 C642 205, 694 205, 726 225"/>
  <g transform="translate(170 0)">
    <rect class="box-out" x="0" y="228" width="98" height="54" rx="7"/>
    <text class="chord" x="49" y="262" text-anchor="middle">C△</text>
  </g>
  <g transform="translate(295 0)">
    <rect class="dominant" x="0" y="228" width="98" height="54" rx="7"/>
    <text class="chord" x="49" y="262" text-anchor="middle">E7</text>
    <text class="roman" x="49" y="302" text-anchor="middle">V7/vi</text>
  </g>
  <g transform="translate(420 0)">
    <rect class="box-out" x="0" y="228" width="98" height="54" rx="7"/>
    <text class="chord" x="49" y="262" text-anchor="middle">A_7</text>
  </g>
  <g transform="translate(545 0)">
    <rect class="dominant" x="0" y="228" width="98" height="54" rx="7"/>
    <text class="chord" x="49" y="262" text-anchor="middle">A7</text>
    <text class="roman" x="49" y="302" text-anchor="middle">V7/ii</text>
  </g>
  <g transform="translate(670 0)">
    <rect class="box-out" x="0" y="228" width="98" height="54" rx="7"/>
    <text class="chord" x="49" y="262" text-anchor="middle">D_7</text>
  </g>
  <g transform="translate(795 0)">
    <rect class="box-out" x="0" y="228" width="98" height="54" rx="7"/>
    <text class="chord" x="49" y="262" text-anchor="middle">G7</text>
  </g>

  <rect class="rule" x="48" y="330" width="864" height="28" rx="6"/>
  <text class="note" x="70" y="349">Rule: replace setup space with V7 of the next diatonic target to create forward pull.</text>
</svg>
