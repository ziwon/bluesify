<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Bluesify retro jazz theory background</title>
  <desc id="desc">A retro jazz piano background with sunset gold, piano keys, and floating chord symbols.</desc>
  <defs>
    <filter id="paper" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="3" seed="17" result="noise" />
      <feColorMatrix in="noise" type="saturate" values="0" result="mono" />
      <feComponentTransfer in="mono">
        <feFuncA type="table" tableValues="0 0.13" />
      </feComponentTransfer>
      <feBlend in="SourceGraphic" mode="multiply" />
    </filter>
    <linearGradient id="sky" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#91c6df" />
      <stop offset="1" stop-color="#b7d9e8" />
    </linearGradient>
    <style>
      .serif {
        font-family: Georgia, "Times New Roman", serif;
        fill: #07165f;
      }
      .small {
        font-size: 21px;
        font-style: italic;
      }
      .chord {
        font-size: 46px;
        font-weight: 700;
        letter-spacing: 0;
      }
      .hint {
        fill: none;
        stroke: #07165f;
        stroke-linecap: round;
        stroke-width: 2.2;
        opacity: 0.34;
      }
      .staff {
        stroke: #07165f;
        stroke-width: 2;
        opacity: 0.24;
      }
      .note {
        fill: #07165f;
        opacity: 0.3;
      }
    </style>
  </defs>

  <rect width="1600" height="900" fill="url(#sky)" />
  <g filter="url(#paper)">
    <rect width="1600" height="900" fill="transparent" />
  </g>

  <path class="hint" d="M70 365 C210 250 315 470 455 330 S720 285 835 405" />
  <path class="hint" d="M1025 90 C1115 175 1260 140 1334 245 S1452 324 1545 250" />
  <path class="hint" d="M118 88 v255" />
  <path class="hint" d="M148 74 v215" />
  <path class="hint" d="M178 94 v237" />
  <path class="hint" d="M208 70 v198" />
  <path class="hint" d="M238 112 v190" />
  <circle cx="142" cy="322" r="13" fill="#fff7d7" />
  <path d="M142 260 l13 40 42 2 -35 23 11 41 -31 -26 -34 24 14 -40 -34 -25 42 1z" fill="#fff2c1" opacity="0.92" />
  <path d="M1316 715 c62 -64 152 -90 252 -72" fill="none" stroke="#07165f" stroke-width="2" opacity="0.28" />

  <g transform="translate(0 545)">
