      <text class="chord" x="0" y="72">CminΔ</text>
    </g>
    <g transform="translate(932 270) rotate(-2)">
      <text class="small" x="14" y="20">sixth sound</text>
      <text class="chord" x="0" y="72">C6</text>
    </g>
    <g transform="translate(1190 330) rotate(6)">
      <text class="small" x="18" y="20">minor sixth</text>
      <text class="chord" x="0" y="72">Cm6</text>
    </g>
    <g transform="translate(350 350) rotate(5)">
      <text class="small" x="18" y="20">altered dominant</text>
      <text class="chord" x="0" y="72">C7(#5)</text>
    </g>
    <g transform="translate(700 398) rotate(-4)">
      <text class="small" x="20" y="20">upper color</text>
      <text class="chord" x="0" y="72">C13</text>
    </g>
    <g transform="translate(1002 428) rotate(3)">
      <text class="small" x="18" y="20">outside tension</text>
      <text class="chord" x="0" y="72">C7alt</text>
      <path d="M164 52 c58 -26 119 -10 155 35" fill="none" stroke="#07165f" stroke-width="3" opacity="0.5" />
    </g>
  </g>

